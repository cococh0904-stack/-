<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei",sans-serif;
}

body{
background:#f4f6fb;
color:#333;
}

header{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
text-align:center;
padding:60px 20px;
}

header img{
width:140px;
height:140px;
border-radius:50%;
border:5px solid white;
margin-bottom:15px;
object-fit:cover;
}

header h1{
font-size:36px;
}

header p{
font-size:18px;
}

.container{
width:85%;
max-width:1000px;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:25px;
margin-bottom:25px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
opacity:0;
transform:translateY(40px);
transition:0.6s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

h2{
border-left:5px solid #4facfe;
padding-left:10px;
margin-bottom:15px;
}

.skills{
margin-top:10px;
}

.skill{
margin-bottom:15px;
}

.skill-name{
margin-bottom:5px;
}

.progress{
background:#ddd;
height:10px;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:10px;
background:#4facfe;
width:0;
transition:1s;
}

.contact{
line-height:1.8;
}

footer{
text-align:center;
padding:20px;
color:#777;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
background:#4facfe;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3398ff;
}

/* 響應式手機 */

@media(max-width:768px){

header h1{
font-size:28px;
}

.container{
width:92%;
}

}

</style>
</head>


<body>

<header>

<img src="https://i.imgur.com/4Z7K9wH.png">

    曾可樂</h1>

<div class="container">

程式設計與科技應用領域有高度興趣。
希望未來能在 AI 技術與商業應用領域持續學習與發展。
</p>

</div>


<div class="card">

<h2>技能</h2>

<div class="skills">

<div class="skill">
<div class="skill-name">Python</div>
<div class="progress">

</div>

<div class="skill">

<div class="progress">

</div>
</div>

<div class="skill">
<div class="skill-name">人工智慧基礎</div>
<div class="progress">
<div class="progress-bar" data-skill="70"></div>

</div>

</div>

</div>


<div class="card">

<div class="card">

Email：cococh0904@gmail.com

</div>

</div>


<footer>

© 2026 Personal Resume

</footer>


<script>

/* 滑動動畫 */

const cards=document.querySelectorAll(".card");

window.addEventListener("scroll",function(){

cards.forEach(card=>{

let top=card.getBoundingClientRect().top;

if(top<window.innerHeight-50){

card.classList.add("show");

}

});

});


/* 技能條動畫 */

window.addEventListener("load",function(){

let bars=document.querySelectorAll(".progress-bar");

bars.forEach(bar=>{

let value=bar.getAttribute("data-skill");

bar.style.width=value+"%";

});

});


function contact(){

alert("歡迎透過 Email 與我聯絡！");

}

</script>

</body>
</html>
