<!DOCTYPE html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei",sans-serif;
}

body{
background:#e5e5e5;
color:#333;
transition:0.3s;
}

header{
background:linear-gradient(135deg,#9e9e9e,#616161);
color:white;
text-align:center;
padding:60px 20px;
}

header img{
width:140px;
height:140px;
border-radius:50%;
border:5px solid white;
margin-bottom:15px;
object-fit:cover;
}

header h1{
font-size:36px;
}

header p{
font-size:18px;
}

.container{
width:85%;
max-width:1000px;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:25px;
margin-bottom:25px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

h2{
border-left:5px solid #757575;
padding-left:10px;
margin-bottom:15px;
}

.skills{
margin-top:10px;
}

.skill{
margin-bottom:15px;
}

.skill-name{
margin-bottom:5px;
}

.progress{
background:#d6d6d6;
height:10px;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:10px;
background:#757575;
width:0;
transition:1s;
}

.contact{
line-height:1.8;
}

footer{
text-align:center;
padding:20px;
color:#555;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
background:#616161;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#424242;
}

/* 深色模式 */

.dark{
background:#1e1e1e;
color:#eee;
}

.dark .card{
background:#2c2c2c;
box-shadow:none;
}

.dark .progress{
background:#555;
}

.dark footer{
color:#aaa;
}

/* 深色模式按鈕 */

.dark-btn{
position:fixed;
top:20px;
right:20px;
padding:10px 15px;
border:none;
border-radius:20px;
background:#424242;
color:white;
cursor:pointer;
}

.dark-btn:hover{
background:#616161;
}

/* 響應式 */

@media(max-width:768px){

header h1{
font-size:28px;
}

.container{
width:92%;
}

}

</style>
</head>

<script>
